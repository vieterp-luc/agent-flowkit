<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; font-size: 11px; background: #0f0f0f; color: #e0e0e0; width: 300px; }

    .header { padding: 10px 12px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 8px; }
    .title { font-size: 12px; font-weight: bold; color: #8b5cf6; letter-spacing: 0.05em; }
    .badge { margin-left: auto; font-size: 10px; padding: 2px 6px; border: 1px solid; font-weight: bold; }
    .badge.idle    { color: #8b5cf6; border-color: #8b5cf6; }
    .badge.off     { color: #6b7280; border-color: #6b7280; }
    .badge.running { color: #f59e0b; border-color: #f59e0b; }

    .section { padding: 8px 12px; border-bottom: 1px solid #1a1a1a; }
    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .label { color: #6b7280; }
    .value { color: #e0e0e0; }
    .value.ok  { color: #22c55e; }
    .value.err { color: #ef4444; }

    .list { max-height: 160px; overflow-y: auto; padding: 6px 12px; }
    .music-entry { padding: 4px 0; border-bottom: 1px solid #1a1a1a; }
    .music-entry .time { color: #6b7280; margin-right: 6px; }
    .music-entry .name { color: #a78bfa; word-break: break-all; font-size: 10px; }
    .empty { color: #6b7280; padding: 10px 0; text-align: center; line-height: 1.6; }

    .actions { padding: 8px 12px; display: flex; gap: 6px; }
    button { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #e0e0e0;
             padding: 4px 8px; font-family: monospace; font-size: 10px; font-weight: bold;
             text-transform: uppercase; cursor: pointer; letter-spacing: 0.05em; }
    button:hover { border-color: #8b5cf6; color: #8b5cf6; }
    button.danger:hover { border-color: #ef4444; color: #ef4444; }

    .note { padding: 6px 12px 10px; color: #6b7280; font-size: 10px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">GEMINI BRIDGE</span>
    <span class="badge off" id="badge">OFF</span>
  </div>

  <div class="section">
    <div class="row">
      <span class="label">Agent WS</span>
      <span id="ws-status" class="value err">disconnected</span>
    </div>
    <div class="row">
      <span class="label">Music captured</span>
      <span id="captured-count" class="value">0</span>
    </div>
  </div>

  <div class="list" id="music-list">
    <div class="empty">No music captured yet.<br>Generate music in Gemini chat.</div>
  </div>

  <div class="actions">
    <button id="btn-reconnect">Reconnect</button>
    <button id="btn-clear" class="danger">Clear</button>
  </div>

  <div class="note">
    Generate music in Gemini → URL is captured automatically → agent downloads the file.
  </div>

  <script src="popup.js"></script>
</body>
</html>
