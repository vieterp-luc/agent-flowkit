<style>

  h1 { font-size: 2rem; margin: 0 0 .5rem; }
  p.lead { color: var(--muted); margin-top: 0; }
  .links { list-style: none; padding: 0; margin: 2rem 0; }
  .links li { margin: .75rem 0; }
  .links a { display: inline-block; padding: .75rem 1rem; background: white; border: 1px solid #e5e7eb; border-radius: 6px; text-decoration: none; color: var(--accent); font-weight: 500; }
  .links a:hover { border-color: var(--accent); }
  footer { color: var(--muted); font-size: .875rem; margin-top: 3rem; border-top: 1px solid #e5e7eb; padding-top: 1rem; }
  footer a { color: var(--muted); }
</style>
</head>
